<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>{% block title %}PowerNZ · Beta privada{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
    <script defer src="{{ url_for('static', path='app.js') }}"></script>
  </head>
  <body>
    <div class="page-glow glow-one"></div>
    <div class="page-glow glow-two"></div>
    <header class="site-header shell">
      <a class="brand" href="/" aria-label="PowerNZ, inicio">
        <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
        <span>Power<span>NZ</span></span>
      </a>
      <span class="beta-badge">BETA PRIVADA</span>
    </header>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer shell">
      <span>PowerNZ · análisis de levantamientos</span>
      <span>Los vídeos se eliminan automáticamente en 24 h.</span>
    </footer>
  </body>
</html>
